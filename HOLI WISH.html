<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  background: linear-gradient(120deg, #ff9a9e, #fad0c4);
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  text-align: center;
  color: white;
  background: rgba(255, 255, 255, 0.15);
  padding: 40px 50px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  animation: glow 3s infinite alternate;
  z-index: 2;
}

h1 {
  font-size: 52px;
}

h2 {
  font-size: 30px;
  margin: 10px 0;
  color: #fff0f5;
}

p {
  font-size: 20px;
  line-height: 1.6;
  margin: 20px 0;
}

span {
  font-size: 16px;
  opacity: 0.9;
}

@keyframes glow {
  from {
    box-shadow: 0 0 20px rgba(255,255,255,0.3);
  }
  to {
    box-shadow: 0 0 40px rgba(255,105,180,0.6);
  }
}

/* Flowers */
.flowers span {
  position: absolute;
  top: -50px;
  font-size: 24px;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
  }
}
</style>

  <script>
  window.console = window.console || function(t) {};

</head>

<body translate="no">
  <div class="container">
  <h1>Happy Holi 💖</h1>
  <h2> </h2>
  <p>
    Like these colors and flowers,<br>
    you make  your audience life more beautiful every day 🌸<br><br>
    May this Holi paint our moments<br>
    with love, smiles  
  </p>
  <span>— From your favourite  disturber 💻🤡❤️</span>
</div>

<div class="flowers"></div>
  
    <script id="rendered-js" >
const flowers = document.querySelector('.flowers');
const flowerEmojis = ['🌸', '🌺', '🌷', '💐', '🌼'];

function createFlower() {
  const flower = document.createElement('span');
  flower.innerText = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
  flower.style.left = Math.random() * 100 + 'vw';
  flower.style.animationDuration = 3 + Math.random() * 4 + 's';
  flowers.appendChild(flower);

  setTimeout(() => {
    flower.remove();
  }, 7000);
}

setInterval(createFlower, 300);
//# sourceURL=pen.js
  </script>

  
</body>
